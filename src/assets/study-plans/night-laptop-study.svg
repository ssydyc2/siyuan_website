      <rect x="220" y="52" width="96" height="84" rx="8" fill="#162831"/>
      <rect x="360" y="2" width="82" height="134" rx="8" fill="#13202A"/>
      <rect x="482" y="42" width="110" height="94" rx="8" fill="#172A33"/>
      <rect class="window-light" x="18" y="94" width="12" height="12" rx="2" fill="#E5BD65"/>
      <rect class="window-light" x="42" y="112" width="12" height="12" rx="2" fill="#DCEBE6"/>
      <rect class="window-light" x="126" y="50" width="12" height="12" rx="2" fill="#E5BD65"/>
      <rect class="window-light" x="154" y="86" width="12" height="12" rx="2" fill="#DCEBE6"/>
      <rect class="window-light" x="244" y="74" width="12" height="12" rx="2" fill="#E5BD65"/>
      <rect class="window-light" x="282" y="104" width="12" height="12" rx="2" fill="#DCEBE6"/>
      <rect class="window-light" x="386" y="26" width="12" height="12" rx="2" fill="#E5BD65"/>
      <rect class="window-light" x="412" y="74" width="12" height="12" rx="2" fill="#DCEBE6"/>
      <rect class="window-light" x="512" y="64" width="12" height="12" rx="2" fill="#E5BD65"/>
      <rect class="window-light" x="558" y="104" width="12" height="12" rx="2" fill="#DCEBE6"/>
    </g>
  </g>

