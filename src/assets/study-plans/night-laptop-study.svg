    <path d="M720 378C725 343 751 327 782 335C807 341 823 360 826 386C799 389 772 381 746 361C742 380 732 395 715 405C711 394 713 386 720 378Z" fill="#20231F"/>
    <circle cx="781" cy="381" r="4.5" fill="#20231F"/>
