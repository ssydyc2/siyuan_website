<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Late night study illustration</title>
  <desc id="desc">A warm HD 2D night scene of a person typing on a laptop with a moonlit window and city lights.</desc>
  <style>
    .star {
      animation: star-blink 2.8s ease-in-out infinite;
    }

    .star-b {
      animation-delay: -1.4s;
    }

    .cursor {
      animation: cursor-blink 0.9s steps(2, end) infinite;
    }

    .hand-left {
      animation: typing-left 0.42s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .hand-right {
      animation: typing-right 0.42s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .screen-line {
      stroke-dasharray: 22 18;
      animation: trace-flow 3s linear infinite;
    }

    .mug-steam {
      animation: steam-rise 3.4s ease-in-out infinite;
      opacity: 0;
    }

    .mug-steam-b {
      animation-delay: -1.5s;
    }

    .window-light {
      animation: light-twinkle 4.5s ease-in-out infinite;
    }

    .window-light:nth-child(3n) {
      animation-delay: -1.8s;
    }

    .window-light:nth-child(4n) {
      animation-delay: -3s;
    }

    @keyframes star-blink {
      0%, 100% { opacity: 0.38; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes cursor-blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    @keyframes typing-left {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(7px); }
    }

    @keyframes typing-right {
      0%, 100% { transform: translateY(7px); }
      50% { transform: translateY(0); }
    }

    @keyframes trace-flow {
      to { stroke-dashoffset: -80; }
    }

    @keyframes steam-rise {
      0% { opacity: 0; transform: translateY(18px); }
      28% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-22px); }
    }

    @keyframes light-twinkle {
      0%, 100% { opacity: 0.34; }
      50% { opacity: 0.86; }
    }

    @media (prefers-reduced-motion: reduce) {
      .star,
      .cursor,
      .hand-left,
      .hand-right,
      .screen-line,
      .mug-steam,
      .window-light {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="nightRoom" x1="800" y1="0" x2="800" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182832"/>
      <stop offset="0.58" stop-color="#22343A"/>
      <stop offset="1" stop-color="#3E342A"/>
    </linearGradient>
    <linearGradient id="windowSky" x1="800" y1="116" x2="800" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1823"/>
      <stop offset="1" stop-color="#20333F"/>
    </linearGradient>
    <linearGradient id="desk" x1="334" y1="552" x2="1284" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9D6530"/>
      <stop offset="1" stop-color="#6F471F"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(905 456) rotate(90) scale(210 390)">
      <stop stop-color="#6CD7C8" stop-opacity="0.45"/>
      <stop offset="0.56" stop-color="#0F766E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#071E1E" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="34" fill="url(#nightRoom)"/>
  <ellipse cx="905" cy="456" rx="390" ry="210" fill="url(#screenGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="416" y="92" width="768" height="404" rx="30" fill="#101B22"/>
    <rect x="448" y="122" width="704" height="344" rx="18" fill="url(#windowSky)"/>
    <path d="M800 122V466M448 296H1152" stroke="#314852" stroke-width="12" stroke-linecap="round"/>
    <circle cx="1038" cy="180" r="48" fill="#E5BD65"/>
    <circle cx="1058" cy="164" r="46" fill="#20333F"/>
    <circle class="star" cx="558" cy="176" r="5" fill="#FFFDF7"/>
    <circle class="star star-b" cx="644" cy="226" r="4" fill="#E5BD65"/>
    <circle class="star" cx="924" cy="206" r="4" fill="#FFFDF7"/>
