<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Walking journey illustration</title>
  <desc id="desc">A warm HD 2D scene of a person walking along a path with trees, sky, hills, and houses.</desc>
  <style>
    .cloud {
      animation: cloud-drift 20s ease-in-out infinite;
    }

    .cloud-b {
      animation-delay: -8s;
      animation-duration: 24s;
    }

    .walker {
      animation: walker-bob 0.9s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .walker-arm {
      animation: arm-swing 0.9s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center top;
    }

    .walker-leg-front {
      animation: front-step 0.9s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center top;
    }

    .walker-leg-back {
      animation: back-step 0.9s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center top;
    }

    .leaf {
      animation: leaf-sway 4.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .leaf-b {
      animation-delay: -2.1s;
    }

    .path-highlight {
      stroke-dasharray: 28 54;
      animation: path-flow 4.5s linear infinite;
    }

    @keyframes cloud-drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(30px); }
    }

    @keyframes walker-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes arm-swing {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(12deg); }
    }

    @keyframes front-step {
      0%, 100% { transform: rotate(-7deg); }
      50% { transform: rotate(10deg); }
    }

    @keyframes back-step {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-12deg); }
    }

    @keyframes leaf-sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(2.5deg); }
    }

    @keyframes path-flow {
      to { stroke-dashoffset: -82; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cloud,
      .walker,
      .walker-arm,
      .walker-leg-front,
      .walker-leg-back,
      .leaf,
      .path-highlight {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="sky" x1="800" y1="0" x2="800" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8E9C9"/>
      <stop offset="0.47" stop-color="#DCEBE6"/>
      <stop offset="1" stop-color="#EFE6D8"/>
    </linearGradient>
    <linearGradient id="path" x1="790" y1="323" x2="794" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7B67B"/>
      <stop offset="1" stop-color="#9D6530"/>
    </linearGradient>
    <linearGradient id="treeTop" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#78A899"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1235 135) rotate(90) scale(120)">
      <stop stop-color="#F8D37E"/>
      <stop offset="0.62" stop-color="#E5BD65" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#E5BD65" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#20231F" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="34" fill="url(#sky)"/>
  <circle cx="1235" cy="135" r="120" fill="url(#sun)"/>
  <circle cx="1235" cy="135" r="42" fill="#E5BD65" opacity="0.88"/>

