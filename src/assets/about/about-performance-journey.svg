      <rect x="288" y="429" width="42" height="38" rx="8" fill="#FFFDF7"/>
      <path d="M295 429V467M288 448H330" stroke="#D8CEC0" stroke-width="5"/>
      <rect x="186" y="521" width="178" height="16" rx="8" fill="#C99A4B"/>
