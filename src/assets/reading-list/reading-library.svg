<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reading library illustration</title>
  <desc id="desc">A warm HD 2D scene of a person reading a book in front of many bookshelves.</desc>
  <style>
    .page {
      animation: page-turn 3.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: left center;
    }

    .reader {
      animation: reader-breathe 4.5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .lamp-glow {
      animation: lamp-pulse 3.8s ease-in-out infinite;
    }

    .book-spine {
      animation: book-shimmer 6s ease-in-out infinite;
    }

    .book-spine:nth-of-type(3n) {
      animation-delay: -1.6s;
    }

    .book-spine:nth-of-type(4n) {
      animation-delay: -3.1s;
    }

    @keyframes page-turn {
      0%, 58%, 100% { transform: scaleX(1); }
      72% { transform: scaleX(0.2) skewY(-7deg); }
      84% { transform: scaleX(0.96); }
    }

    @keyframes reader-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes lamp-pulse {
      0%, 100% { opacity: 0.46; }
      50% { opacity: 0.72; }
    }

    @keyframes book-shimmer {
      0%, 100% { opacity: 0.82; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page,
      .reader,
      .lamp-glow,
      .book-spine {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="room" x1="800" y1="0" x2="800" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5E4"/>
      <stop offset="0.56" stop-color="#EEE7DA"/>
      <stop offset="1" stop-color="#D8CEC0"/>
    </linearGradient>
    <linearGradient id="shelfWood" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9D6530"/>
      <stop offset="1" stop-color="#6F471F"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1192 207) rotate(90) scale(255 310)">
      <stop stop-color="#E5BD65" stop-opacity="0.82"/>
      <stop offset="0.6" stop-color="#E5BD65" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#E5BD65" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#20231F" flood-opacity="0.15"/>
    </filter>
  </defs>

